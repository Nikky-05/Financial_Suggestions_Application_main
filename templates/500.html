{% extends "base.html" %}

{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="text-center">
        <h1 class="display-1 fw-bold text-danger">500</h1>
        <h2 class="h3 mb-4">Internal Server Error</h2>
        <p class="text-muted mb-4">Something went wrong on our end. Please try again later.</p>
        <a href="{{ url_for('dashboard') }}" class="btn btn-primary btn-lg">
            <i class="bi bi-house"></i> Go to Dashboard
        </a>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-secondary btn-lg ms-2">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>
</div>
{% endblock %}
